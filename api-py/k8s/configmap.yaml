apiVersion: v1
kind: ConfigMap
metadata:
  name: parsely-api-config
  namespace: parsely  # pins the object inside our namespace
data:
  # Non-secret runtime config. Edit values here if yours differ from these
  # defaults — they're applied to the pod as plain env vars on startup.
  AZURE_DI_ENDPOINT: "https://taia-ams-docai.cognitiveservices.azure.com/"
  AZURE_BLOB_CONTAINER: "uploads"
  CORS_ALLOWED_ORIGINS: "http://localhost:3000"

# - a ConfigMap is just a key-value store living inside the cluster
# - when the Deployment's container starts, K8s reads this ConfigMap and injects each 
# key as an env var. Inside the running container, os.environ["AZURE_DI_ENDPOINT"] will
# return that URL